---
- name: Actualizar cache de apt
  ansible.builtin.apt:
    update_cache: true
  
- name: Instalar Podman
  ansible.builtin.package:
    name: podman
    state: present

- name: Crear directorio de trabajo
  ansible.builtin.file:
    path: /opt/webserver
    state: directory

- name: Copiar Dockerfile
  ansible.builtin.template:
    src: Dockerfile.j2
    dest: /opt/webserver/Dockerfile

- name: Copiar nginx.conf
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /opt/webserver/nginx.conf

- name: Copiar index.html
  ansible.builtin.template:
    src: index.html.j2
    dest: /opt/webserver/index.html

- name: Crear directorio SSL dentro del contexto Docker
  ansible.builtin.file:
    path: /opt/webserver/ssl
    state: directory

- name: Login en ACR
  containers.podman.podman_login:
    registry: "{{ acr_name }}"
    username: "{{ acr_user }}"
    password: "{{ acr_password }}"
  no_log: true

- name: Construir imagen
  containers.podman.podman_image:
    name: "{{ acr_name }}/{{ image_name }}"
    tag: "{{ image_tag }}"
    path: /opt/webserver
    build:
      file: /opt/webserver/Dockerfile
    state: build

- name: Subir imagen al ACR
  containers.podman.podman_image:
    name: "{{ acr_name }}/{{ image_name }}"
    tag: "{{ image_tag }}"
    push: true
    push_args:
      dest: "{{ acr_name }}/{{ image_name }}:{{ image_tag }}"

- name: Copiar servicio systemd
  ansible.builtin.template:
    src: nginx-podman.service.j2
    dest: /etc/systemd/system/nginx-podman.service

- name: Recargar systemd
  ansible.builtin.systemd_service:
    daemon_reload: true

- name: Habilitar e iniciar el servicio
  ansible.builtin.systemd_service:
    name: nginx-podman
    enabled: true
    state: started